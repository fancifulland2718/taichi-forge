# Builds a stock LLVM 20.1.x distribution on windows-2026 (MSVC) and
# uploads the zip to a GitHub Release. The release asset URL is then
# wired into the PyPI publish workflow via the `LLVM20_WIN_URL` repo
# variable.
#
# For day-to-day iteration prefer scripts/build_llvm20_local.ps1.
name: Build LLVM 20 for Windows

on:
  workflow_dispatch:
    inputs:
      llvm_tag:
        description: "LLVM git tag (e.g. llvmorg-20.1.7)"
        required: true
        default: "llvmorg-20.1.7"
      release_tag:
        description: "GitHub release tag to create / update"
        required: true
        default: "llvm20"

permissions:
  # Needed by softprops/action-gh-release to create the GitHub Release.
  # Without this the step errors with "Resource not accessible by integration".
  contents: write

jobs:
  build-llvm20-windows:
    runs-on: windows-2026
    timeout-minutes: 360
    steps:
      - name: Checkout (for workflow metadata)
        uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone LLVM
        shell: pwsh
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.llvm_tag }}" https://github.com/llvm/llvm-project.git llvm-project

      - name: Configure LLVM
        shell: pwsh
        run: |
          $installDir = "${{ github.workspace }}\dist\taichi-llvm-20"
          cmake -S llvm-project/llvm -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$installDir" `
            -DLLVM_ENABLE_PROJECTS="" `
            -DLLVM_TARGETS_TO_BUILD="X86;NVPTX;AMDGPU" `
            -DLLVM_EXPERIMENTAL_TARGETS_TO_BUILD="DirectX" `
            -DLLVM_ENABLE_RTTI=ON `
            -DLLVM_ENABLE_ASSERTIONS=OFF `
            -DLLVM_ENABLE_TERMINFO=OFF `
            -DLLVM_ENABLE_ZSTD=OFF `
            -DLLVM_ENABLE_ZLIB=OFF `
            -DLLVM_ENABLE_LIBXML2=OFF `
            -DLLVM_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_BENCHMARKS=OFF `
            -DLLVM_INCLUDE_EXAMPLES=OFF `
            -DLLVM_INCLUDE_DOCS=OFF `
            -DLLVM_BUILD_LLVM_C_DYLIB=OFF `
            -DLLVM_BUILD_TOOLS=OFF `
            -DLLVM_BUILD_UTILS=OFF `
            -DLLVM_HOST_TRIPLE=x86_64-pc-windows-msvc

      - name: Build & install LLVM
        shell: pwsh
        run: cmake --build build --target install --config Release

      - name: Package zip
        shell: pwsh
        run: |
          $zipName = "taichi-llvm-20-msvc2026.zip"
          Compress-Archive -Path "dist/taichi-llvm-20/*" -DestinationPath $zipName
          Get-FileHash $zipName -Algorithm SHA256 | Tee-Object -FilePath "$zipName.sha256.txt"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: LLVM 20 Windows MSVC2026
          files: |
            taichi-llvm-20-msvc2026.zip
            taichi-llvm-20-msvc2026.zip.sha256.txt
          draft: false
          prerelease: false
          # Use a PAT stored as RELEASE_PAT if GITHUB_TOKEN lacks write
          # scope (common on forks or restrictive org policies). Falls
          # back to GITHUB_TOKEN otherwise.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
