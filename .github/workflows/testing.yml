name: Smoke CI
# Lightweight build + smoke-test on GitHub-hosted runners.
# No self-hosted runners, no CUDA, no private Docker registries required.
#
# Prerequisites (repo Variables → Actions → Variables):
#   LLVM20_WIN_URL              URL to prebuilt LLVM 20 zip for Windows/MSVC
#   LLVM20_LINUX_MANYLINUX_URL  URL to prebuilt LLVM 20 zip for Linux/manylinux_2_28
#
# Produce these URLs by running the "Build LLVM 20 for Windows" /
# "Build LLVM 20 for Linux" workflows once and copying the release-asset URL.
#
# Trigger: manual only.  For full multi-version wheel production use
# publish_pypi.yml instead.
on:
  workflow_dispatch:
    inputs:
      python:
        description: "Python version (e.g. 3.11, 3.12)"
        required: false
        default: "3.11"

concurrency:
  group: smoke-${{ github.run_id }}
  cancel-in-progress: true

env:
  TI_CI: "1"
  TI_SKIP_VERSION_CHECK: "ON"
  LLVM20_WIN_URL: ${{ vars.LLVM20_WIN_URL }}
  LLVM20_LINUX_MANYLINUX_URL: ${{ vars.LLVM20_LINUX_MANYLINUX_URL }}

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Python syntax check (no compilation, runs in < 1 min)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check (py_compile)
        # Walk every .py under python/taichi, fail on the first syntax error.
        run: python -m compileall -q python/taichi

      - name: Validate version.txt
        run: |
          python -c "
          import re, pathlib
          ver = pathlib.Path('version.txt').read_text().strip().lstrip('v')
          assert re.fullmatch(r'[0-9]+\.[0-9]+\.[0-9]+.*', ver), f'Bad version: {ver}'
          print('version.txt OK:', ver)
          "

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — CPU-only wheel build + smoke test on Linux
# ─────────────────────────────────────────────────────────────────────────────
  build_smoke_linux:
    name: Build + smoke (Linux, py${{ inputs.python || '3.11' }})
    runs-on: ubuntu-22.04
    env:
      PY: ${{ inputs.python || '3.11' }}
      # CPU + LLVM only — no CUDA, Vulkan, OpenGL, C-API, or test binaries.
      # Keeps build time under ~30 min on a GitHub-hosted runner.
      TAICHI_CMAKE_ARGS: >-
        -DTI_WITH_CUDA:BOOL=OFF
        -DTI_WITH_VULKAN:BOOL=OFF
        -DTI_WITH_OPENGL:BOOL=OFF
        -DTI_WITH_LLVM:BOOL=ON
        -DTI_WITH_C_API:BOOL=OFF
        -DTI_BUILD_TESTS:BOOL=OFF
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python || '3.11' }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build ccache \
            libxi-dev libx11-dev libtinfo-dev libxml2-dev

      - name: Download prebuilt LLVM 20
        run: |
          set -euo pipefail
          if [[ -z "${LLVM20_LINUX_MANYLINUX_URL}" ]]; then
            echo "::error::LLVM20_LINUX_MANYLINUX_URL repo variable is not set."
            echo "  Run 'Build LLVM 20 for Linux' workflow first, then add the release-asset URL."
            exit 1
          fi
          mkdir -p dist/taichi-llvm-20
          wget -q -O /tmp/llvm20.zip "${LLVM20_LINUX_MANYLINUX_URL}"
          python -m zipfile -e /tmp/llvm20.zip dist/taichi-llvm-20
          echo "LLVM_DIR=$GITHUB_WORKSPACE/dist/taichi-llvm-20/lib/cmake/llvm" >> "$GITHUB_ENV"

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip build
          python -m pip install --upgrade "scikit-build-core>=0.10" cmake "pybind11>=2.13" ninja

      - name: Build wheel (CPU only)
        run: python -I -m build --wheel --no-isolation

      - name: Smoke test
        run: |
          pip install dist/*.whl
          python -c "
          import taichi as ti
          ti.init(arch=ti.cpu)
          @ti.kernel
          def double(x: float) -> float:
              return x * 2.0
          result = double(21.0)
          assert result == 42.0, f'expected 42.0, got {result}'
          print('Linux smoke test PASSED')
          "

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-smoke-linux-py${{ inputs.python || '3.11' }}
          path: dist/*.whl
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — CPU-only wheel build + smoke test on Windows
# ─────────────────────────────────────────────────────────────────────────────
  build_smoke_windows:
    name: Build + smoke (Windows, py${{ inputs.python || '3.11' }})
    runs-on: windows-2026
    env:
      PY: ${{ inputs.python || '3.11' }}
      TAICHI_CMAKE_ARGS: >-
        -DTI_WITH_CUDA:BOOL=OFF
        -DTI_WITH_VULKAN:BOOL=OFF
        -DTI_WITH_OPENGL:BOOL=OFF
        -DTI_WITH_LLVM:BOOL=ON
        -DTI_WITH_C_API:BOOL=OFF
        -DTI_BUILD_TESTS:BOOL=OFF
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Enable long paths
        shell: pwsh
        run: git config --system core.longpaths true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python || '3.11' }}

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Download prebuilt LLVM 20
        shell: pwsh
        run: |
          $url = "${{ env.LLVM20_WIN_URL }}"
          if (-not $url) {
            Write-Error "LLVM20_WIN_URL repo variable is not set. Run 'Build LLVM 20 for Windows' first."
            exit 1
          }
          New-Item -ItemType Directory -Force -Path dist\taichi-llvm-20 | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\llvm20.zip"
          Expand-Archive -Path "$env:TEMP\llvm20.zip" -DestinationPath dist\taichi-llvm-20
          $llvmDir = (Resolve-Path "dist\taichi-llvm-20\lib\cmake\llvm").Path
          "LLVM_DIR=$llvmDir" | Out-File -Append $env:GITHUB_ENV -Encoding utf8

      - name: Install Python build deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip build
          python -m pip install --upgrade "scikit-build-core>=0.10" cmake "pybind11>=2.13"

      - name: Build wheel (CPU only)
        shell: pwsh
        run: python -I -m build --wheel --no-isolation

      - name: Smoke test
        shell: pwsh
        run: |
          $whl = (Get-ChildItem dist\*.whl | Select-Object -First 1).FullName
          pip install $whl
          python -c "
          import taichi as ti
          ti.init(arch=ti.cpu)
          @ti.kernel
          def double(x: float) -> float:
              return x * 2.0
          result = double(21.0)
          assert result == 42.0
          print('Windows smoke test PASSED')
          "

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-smoke-windows-py${{ inputs.python || '3.11' }}
          path: dist\*.whl
          retention-days: 7